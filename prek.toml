#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "local"
hooks = [
    { id = "cargo-fmt-check", name = "cargo fmt check", language = "system", entry = "cargo fmt --check", types = ["rust"], pass_filenames = false },
    { id = "cargo-clippy", name = "cargo clippy", language = "system", entry = "cargo clippy --all-targets --all-features -- -D warnings", types = ["rust"], pass_filenames = false },
]

[[repos]]
repo = "builtin"
hooks = [
    { id = "mixed-line-ending", name = "Unified line ending", language = "system", args = ["--fix=lf"] },
]
